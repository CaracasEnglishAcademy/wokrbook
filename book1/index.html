<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Workbook System</title>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #E1EFF7;
            --color-primary: #00609F;
            --color-secondary: #84B2CF;
            --color-dark: #0D4E7A;
            --text-main: #333333;
            --text-headers: #0D4E7A;
            --text-inputs: #00609F;
        }

        body { font-family: sans-serif; background-color: var(--bg-primary); color: var(--text-main); margin: 0; padding: 20px; }
        header { background-color: var(--color-dark); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .admin-panel { background: white; padding: 15px; border-radius: 8px; border: 2px dashed var(--color-primary); margin-bottom: 20px; display: none; }
        .lesson-nav { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .lesson-btn { background-color: white; border: 2px solid var(--color-secondary); padding: 12px; cursor: pointer; font-weight: bold; }
        .lesson-btn.active { background-color: var(--color-primary); color: white; }
        .lesson-btn.locked { background-color: #e0e0e0; cursor: not-allowed; opacity: 0.6; }
        .main-card { background: white; padding: 30px; border-radius: 8px; }
        textarea, input[type="text"] { width: 100%; padding: 12px; border: 1px solid var(--color-secondary); margin-bottom: 15px; box-sizing: border-box; }
        .btn-action { background-color: var(--color-primary); color: white; padding: 12px 24px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="adminPanel" class="admin-panel">
        <h3>Admin Tools</h3>
        <div id="teacherGradingControls" style="display:none;">
            <p>Reviewing student work...</p>
            <input type="text" id="teacherGradeInput" placeholder="Enter Grade">
            <button class="btn-action" onclick="evaluateLesson('passed')">Approve</button>
            <button class="btn-action" style="background:red;" onclick="evaluateLesson('failed')">Reject</button>
        </div>
    </div>

    <header>
        <h1>Caracas English Academy</h1>
    </header>

    <div class="lesson-nav">
        <script>
            for(let i=1; i<=12; i++) document.write(`<button class="lesson-btn locked" id="btn${i}">Lesson ${i}</button>`);
        </script>
    </div>

    <div class="main-card">
        <div id="identitySection">
            <h2>Student Registration</h2>
            <input type="text" id="studentName" placeholder="Full Name">
            <input type="text" id="discordHandle" placeholder="Discord Handle">
            <button class="btn-action" onclick="registerWorkbook()">Start</button>
        </div>
        <div id="workbookContent" style="display:none;">
            <h2 id="currentLessonTitle">Lesson 1</h2>
            <textarea id="lessonTextarea" rows="8"></textarea>
            <button id="submitLessonBtn" class="btn-action" onclick="submitLessonForGrading()">Submit</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = "https://zddovywavwhrdcuohahb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ypCK4DGF5mNB3Ft-XnHarg_wgMS5sy-";
        
        // Use unique variable to avoid library conflict
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // UI Initialization
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('admin')) document.getElementById('adminPanel').style.display = 'block';

        async function registerWorkbook() {
            const name = document.getElementById('studentName').value;
            const discord = document.getElementById('discordHandle').value;
            if(!name) return alert("Enter a name");

            // Inserting into Book 1 table
            const { data, error } = await supabaseClient.from('book1_workbooks').insert([{ 
                student_name: name, discord_handle: discord 
            }]).select().single();

            if(error) { console.error(error); alert("Database error: " + error.message); }
            else { 
                localStorage.setItem('workbook_record_id', data.id);
                location.reload(); 
            }
        }

        async function submitLessonForGrading() {
            alert("Submission feature active.");
        }

        async function evaluateLesson(status) {
            alert("Grading feature active.");
        }
    </script>
</body>
</html>
